name: "GitHub Release Tag"
description: "Creates a GitHub release tag based on conventional commits."
branding:
  icon: "tag"
  color: "blue"

inputs:
  github_token:
    description: "Required for permission to tag the repo."
    required: true
  default_bump:
    description: "Which type of bump to use when none explicitly provided (default: `patch`)."
    required: false
    default: "patch"
  tag_prefix:
    description: "A prefix to the tag name (default: `v`)."
    required: false
    default: "v"
  custom_tag:
    description: "Custom tag name. If specified, it overrides bump settings."
    required: false
  release_branches:
    description: "Comma separated list of branches that will generate the release tags."
    required: false
    default: "master,main"
  dry_run:
    description: "Do not perform tagging, just calculate next version and changelog, then exit."
    required: false
    default: "false"
  generate_release:
    description: "Whether to create a GitHub release object (default: `false`)."
    required: false
    default: "false"
  release_name:
    description: "Template for the release name. Use `{tag}` to insert the generated tag (default: `Release {tag}`)."
    required: false
    default: "Release {tag}"
  release_body:
    description: "Optional explicit body for the release. If empty, the generated changelog is used."
    required: false
  draft:
    description: "Create a draft release (default: `false`)."
    required: false
    default: "false"
  prerelease:
    description: "Create a prerelease (default: `false`)."
    required: false
    default: "false"
  artifacts:
    description: "A comma/newline separated list of glob patterns (e.g. `release_assets/*`) to upload as release assets."
    required: false

outputs:
  new_tag:
    description: "Generated tag"
    value: ${{ steps.tag_action.outputs.new_tag }}
  new_version:
    description: "Generated tag without the prefix"
    value: ${{ steps.tag_action.outputs.new_version }}
  previous_tag:
    description: "Previous tag (or `0.0.0`)"
    value: ${{ steps.tag_action.outputs.previous_tag }}
  release_type:
    description: "The computed release type"
    value: ${{ steps.tag_action.outputs.release_type }}
  changelog:
    description: "The conventional changelog since the previous tag"
    value: ${{ steps.tag_action.outputs.changelog }}

runs:
  using: "composite"
  steps:
    - name: Determine Target
      id: target
      shell: bash
      run: |
        OS="${{ runner.os }}"
        ARCH="${{ runner.arch }}"
        TARGET=""
        if [[ "$OS" == "Linux" ]]; then
          if [[ "$ARCH" == "X64" ]]; then TARGET="x86_64-unknown-linux-musl"; fi
          if [[ "$ARCH" == "ARM64" ]]; then TARGET="aarch64-unknown-linux-musl"; fi
        elif [[ "$OS" == "macOS" ]]; then
          if [[ "$ARCH" == "X64" ]]; then TARGET="x86_64-apple-darwin"; fi
          if [[ "$ARCH" == "ARM64" ]]; then TARGET="aarch64-apple-darwin"; fi
        elif [[ "$OS" == "Windows" ]]; then
          if [[ "$ARCH" == "X64" ]]; then TARGET="x86_64-pc-windows-msvc"; fi
        fi

        if [[ -z "$TARGET" ]]; then
          echo "Unsupported OS/Arch combination: $OS/$ARCH"
          exit 1
        fi
        echo "target=$TARGET" >> $GITHUB_OUTPUT

    - name: Download Binary
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        ACTION_REF: ${{ github.action_ref }}
      run: |
        TARGET="${{ steps.target.outputs.target }}"
        EXTENSION=""
        if [[ "$TARGET" == *"windows"* ]]; then EXTENSION=".exe"; fi
        BINARY="github-release-tag-${TARGET}${EXTENSION}"

        TARGET_TAG="$ACTION_REF"
        if [[ -z "$TARGET_TAG" ]]; then
          echo "Action locally called via uses: ./ - forcing build from source to test latest changes..."
          DOWNLOAD_FAILED=true
        elif [[ "$TARGET_TAG" == "main" || "$TARGET_TAG" == "master" ]]; then
          echo "Downloading latest release..."
          gh release download --repo caffeine-soft/github-release-tag --pattern "$BINARY" || DOWNLOAD_FAILED=true
        else
          echo "Downloading release for tag $TARGET_TAG..."
          if ! gh release download "$TARGET_TAG" --repo caffeine-soft/github-release-tag --pattern "$BINARY"; then
            echo "Failed to download from tag $TARGET_TAG. Attempting to download from latest release..."
            gh release download --repo caffeine-soft/github-release-tag --pattern "$BINARY" || DOWNLOAD_FAILED=true
          fi
        fi

        if [[ "$DOWNLOAD_FAILED" == "true" ]]; then
          echo "Warning: Failed to download pre-compiled binary. Falling back to building from source."
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo build --release --manifest-path ${{ github.action_path }}/Cargo.toml
          mv ${{ github.action_path }}/target/release/github-release-tag${EXTENSION} "github-release-tag${EXTENSION}"
        else
          mv "$BINARY" "github-release-tag${EXTENSION}"
          chmod +x "github-release-tag${EXTENSION}"
        fi

    - name: Execute Action
      id: tag_action
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        INPUT_DEFAULT_BUMP: ${{ inputs.default_bump }}
        INPUT_TAG_PREFIX: ${{ inputs.tag_prefix }}
        INPUT_CUSTOM_TAG: ${{ inputs.custom_tag }}
        INPUT_RELEASE_BRANCHES: ${{ inputs.release_branches }}
        INPUT_DRY_RUN: ${{ inputs.dry_run }}
        INPUT_GENERATE_RELEASE: ${{ inputs.generate_release }}
        INPUT_RELEASE_NAME: ${{ inputs.release_name }}
        INPUT_RELEASE_BODY: ${{ inputs.release_body }}
        INPUT_DRAFT: ${{ inputs.draft }}
        INPUT_PRERELEASE: ${{ inputs.prerelease }}
        INPUT_ARTIFACTS: ${{ inputs.artifacts }}
      run: |
        TARGET="${{ steps.target.outputs.target }}"
        EXTENSION=""
        if [[ "$TARGET" == *"windows"* ]]; then EXTENSION=".exe"; fi
        ./github-release-tag${EXTENSION}
